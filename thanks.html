<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Sent | Fix It Mobile</title>
  <style>
    :root {
      --ink: #18261f;
      --ink-soft: #58645d;
      --brand: #d96d3d;
      --accent: #1d654f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(217, 109, 61, 0.16), transparent 28%),
        radial-gradient(circle at 88% 0%, rgba(29, 101, 79, 0.13), transparent 22%),
        linear-gradient(180deg, #f8f3eb 0%, #f4eee6 42%, #f7f4ef 100%);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .card {
      width: min(720px, 100%);
      padding: 36px;
      border-radius: 32px;
      background: rgba(255, 253, 249, 0.94);
      border: 1px solid rgba(24, 38, 31, 0.1);
      box-shadow: 0 24px 60px rgba(50, 38, 23, 0.12);
      text-align: center;
    }

    .badge {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--brand), #f2ba63);
      color: white;
      font-size: 1.5rem;
      font-weight: 900;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      line-height: 0.98;
      margin-bottom: 14px;
    }

    p {
      color: var(--ink-soft);
      margin-bottom: 20px;
      font-size: 1.02rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }

    .button-primary {
      color: white;
      background: linear-gradient(135deg, var(--brand), #ef966b);
    }

    .button-secondary {
      color: var(--ink);
      background: rgba(221, 241, 232, 0.74);
      border: 1px solid rgba(29, 101, 79, 0.14);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">F</div>
    <h1>Repair request sent.</h1>
    <p>Fix It Mobile should receive the details by email, including any uploaded photos. If you are ready to reserve the visit now, you can pay the $20 deposit next.</p>
    <div class="button-row">
      <a class="button button-primary" href="https://checkout.square.site/merchant/MLZWW74P8HSVE/checkout/LESM5RNBYTT5KAB76HYXXYL5" target="_blank" rel="noopener noreferrer">Pay $20 Deposit</a>
      <a class="button button-secondary" href="index.html">Back to Home</a>
    </div>
  </div>
</body>
</html>
